name: Test gtsp

on:
  push:
    branches: [master, main]
    paths:
      - 'gtsp/**'
  pull_request:
    paths:
      - 'gtsp/**'

jobs:
  test:
    name: Test (${{ matrix.goos }}-${{ matrix.goarch }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            os: macos-latest
          - goos: linux
            goarch: amd64
            os: ubuntu-latest
          - goos: windows
            goarch: amd64
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        working-directory: gtsp
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -o gtsp-test.exe ./src/

      - name: Test
        working-directory: gtsp
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go test ./test/ -v -timeout 120s

      - name: Clean up
        if: always()
        working-directory: gtsp
        run: rm -f gtsp-test.exe
        shell: bash
