name: Build and Release gtsp

on:
  push:
    tags:
      - 'gtsp-v*'

jobs:
  build-gtsp:
    name: Build gtsp for ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        working-directory: gtsp/src
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          BINARY_NAME="gtsp-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY_NAME="${BINARY_NAME}.exe"
          fi
          go build -ldflags="-s -w" -o "${BINARY_NAME}" main.go
          echo "BINARY_PATH=gtsp/src/${BINARY_NAME}" >> $GITHUB_ENV
          echo "BINARY_NAME=${BINARY_NAME}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}
          path: ${{ env.BINARY_PATH }}

  create-release:
    name: Create Release
    needs: build-gtsp
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: Prepare release assets
        run: |
          cd release
          # Artifact directories have same name as files inside them
          # Move files out by going into each directory first
          for dir in */; do
            if [ -d "$dir" ]; then
              # Get the files inside the directory
              files=$(find "$dir" -type f)
              for f in $files; do
                # Rename to avoid conflict with directory name during move
                filename=$(basename "$f")
                mv "$f" "./${filename}.tmp"
              done
              # Now safe to remove the directory
              rm -rf "$dir"
              # Rename back to original name
              for tmpfile in *.tmp; do
                mv "$tmpfile" "${tmpfile%.tmp}"
              done
            fi
          done
          chmod +x gtsp-linux-* gtsp-darwin-* || true
          ls -la

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
