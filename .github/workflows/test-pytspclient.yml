name: Test pytspclient

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  build-gtsp:
    name: Build gtsp (${{ matrix.goos }}-${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        working-directory: gtsp/src
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          BINARY_NAME="gtsp-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY_NAME="${BINARY_NAME}.exe"
          fi
          go build -ldflags="-s -w" -o "${BINARY_NAME}" main.go
          echo "BINARY_NAME=${BINARY_NAME}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}
          path: gtsp/src/${{ env.BINARY_NAME }}

  test:
    name: Run pytspclient tests
    needs: build-gtsp
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download gtsp-linux-amd64
        uses: actions/download-artifact@v4
        with:
          name: gtsp-linux-amd64
          path: gtsp/dist

      - name: Make binary executable
        run: chmod +x gtsp/dist/gtsp-linux-amd64

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: pip install pytest pytest-asyncio

      - name: Run pytspclient tests
        working-directory: client/pytspclient
        env:
          GTSP_PATH: ../../gtsp/dist/gtsp-linux-amd64
        run: python -m pytest tests/ -v
